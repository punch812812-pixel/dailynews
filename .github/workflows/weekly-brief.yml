name: 주간 브리핑 자동 발행

on:
  schedule:
    - cron: '0 21 * * 4'   # 매주 금요일 06:00 KST
  workflow_dispatch: {}     # 수동 실행 버튼 (테스트용)

permissions:
  contents: write
  pull-requests: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 브리핑 생성 (수집 → 선별 → 검증 → AI 검수)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}   # 비워두면 자동 탐지, 지정하면 그 모델 고정
        run: python pipeline/generate_issue.py

      - name: 자동 커밋·배포
        if: ${{ vars.AUTO_PUBLISH == 'true' }}
        run: |
          git config user.name "brief-bot"
          git config user.email "actions@github.com"
          git add data/issues.json
          git commit -m "자동 발행: $(date +%Y-%m-%d) 호"
          git push

      - name: 승인용 PR 생성
        if: ${{ vars.AUTO_PUBLISH != 'true' }}
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "발행 대기 호"
          title: "이번 주 브리핑 발행 승인 요청"
          body: |
            자동 생성된 이번 주 호입니다.
            Files changed 탭에서 기사를 훑어보고, 괜찮으면 Merge 버튼을 누르세요.
            병합하는 순간 사이트에 발행됩니다. 문제가 있으면 PR을 닫으면 됩니다(결호).
          branch: weekly-brief
          delete-branch: true
