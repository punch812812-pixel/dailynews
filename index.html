<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>어린이 사회 뉴스 브리핑</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FAF6EC;        /* 크림 지면 */
  --ink:#1C1B18;          /* 본문 먹색 */
  --ink-soft:#5C5850;     /* 보조 텍스트 */
  --red:#B5342A;          /* 국내·강조 빨강 */
  --blue:#2A5674;         /* 해외 파랑 */
  --line:#1C1B18;         /* 굵은 괘선 */
  --line-soft:#D8D2C4;    /* 가는 괘선 */
  --box:#F1EBDD;          /* 박스 배경 */
  --serif:'Noto Serif KR', 'Nanum Myeongjo', serif;
  --sans:'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:17px}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.75;
  -webkit-font-smoothing:antialiased}
.wrap{max-width:820px;margin:0 auto;padding:0 20px 80px}

/* ── 제호 ── */
header.masthead{padding:34px 0 0;text-align:center}
.mast-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.mast-side{font-size:.72rem;color:var(--ink-soft);line-height:1.6;text-align:left;min-width:96px;padding-top:14px}
.mast-side.right{text-align:right}
h1.brand{font-family:var(--serif);font-weight:900;font-size:clamp(1.7rem,5.4vw,2.7rem);
  letter-spacing:.06em;line-height:1.25;word-break:keep-all}
h1.brand a{color:inherit;text-decoration:none}
.slogan{font-size:.85rem;color:var(--ink-soft);margin-top:10px}
.mast-rule{border:0;border-top:3px solid var(--line);margin:20px 0 0}
.mast-rule.thin{border-top:1px solid var(--line);margin-top:3px}

/* ── 호 내비게이션 ── */
.issue-nav{display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:14px 0;border-bottom:1px solid var(--line-soft);flex-wrap:wrap}
.issue-nav .nav-btn{font-size:.8rem;border:1px solid var(--line-soft);background:transparent;
  padding:7px 12px;cursor:pointer;color:var(--ink);font-family:var(--sans)}
.issue-nav .nav-btn:disabled{color:#B7B0A2;cursor:default}
.issue-nav .nav-btn:not(:disabled):hover{border-color:var(--ink)}
.issue-now{font-weight:700;font-size:.92rem}

/* ── 성취기준 스트립 ── */
.std-strip{font-size:.78rem;color:var(--ink-soft);padding:11px 0;border-bottom:1px solid var(--line-soft);
  display:flex;flex-wrap:wrap;gap:4px 10px;align-items:baseline}
.std-strip b{color:var(--red);font-weight:700}

/* ── 시그니처: 요일 시간표 탭 ── */
.day-tabs{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));border:2px solid var(--line);
  margin:26px 0 0;background:var(--paper)}
.day-tab{appearance:none;border:0;background:transparent;border-right:1px solid var(--line-soft);
  padding:12px 4px 10px;cursor:pointer;font-family:var(--sans);text-align:center;position:relative;
  min-width:0;overflow:hidden}
.day-tab:last-child{border-right:0}
.day-tab .d-name{display:block;font-family:var(--serif);font-weight:700;font-size:1.05rem}
.day-tab .d-topic{display:block;font-size:.64rem;color:var(--ink-soft);margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.day-tab[aria-selected="true"]{background:var(--ink);color:var(--paper)}
.day-tab[aria-selected="true"] .d-topic{color:#CFC9BB}
.day-tab .today-dot{position:absolute;top:6px;right:8px;width:7px;height:7px;border-radius:50%;
  background:var(--red)}
.day-tab:focus-visible{outline:3px solid var(--red);outline-offset:-3px;z-index:1}
.today-note{font-size:.78rem;color:var(--ink-soft);text-align:right;padding:8px 2px 0}
.today-note b{color:var(--red)}

/* ── 기사 ── */
article.piece{padding:34px 0 8px}
.piece-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.section-box{background:var(--ink);color:var(--paper);font-family:var(--serif);font-weight:700;
  padding:5px 14px;font-size:.95rem;letter-spacing:.28em;padding-right:8px}
.section-sub{font-size:.8rem;color:var(--ink-soft)}
.meta-row{display:flex;align-items:center;gap:10px;margin:18px 0 10px}
.scope{font-size:.72rem;font-weight:700;border:1px solid currentColor;padding:2px 9px}
.scope.dom{color:var(--red)} .scope.intl{color:var(--blue)}
.report-date{font-size:.8rem;font-weight:700}
h2.headline{font-family:var(--serif);font-weight:900;font-size:clamp(1.45rem,4.4vw,2.1rem);
  line-height:1.4;word-break:keep-all}
.deck{font-weight:700;font-size:.98rem;margin-top:10px;word-break:keep-all}
.body-rule{border:0;border-top:1px solid var(--line-soft);margin:20px 0}
.piece p.para{font-size:1.02rem;margin-bottom:1.15em;word-break:keep-all}
.piece p.para:last-of-type{margin-bottom:0}

/* 원문 링크 */
.src-links{margin:22px 0 4px}
.src-links a{color:var(--red);font-weight:700;text-decoration:none;font-size:.92rem;
  border-bottom:2px solid var(--red);padding-bottom:2px;margin-right:16px;display:inline-block}

/* 낱말 도움 */
.wordhelp{background:var(--box);border:1px dashed var(--ink-soft);padding:16px 18px;margin:24px 0 0}
.wordhelp h3, .thinkbox h3{font-size:.78rem;letter-spacing:.3em;font-weight:700;margin-bottom:10px}
.wordhelp dl{font-size:.92rem}
.wordhelp dt{font-weight:700;display:inline}
.wordhelp dd{display:inline;margin-left:4px}
.wordhelp .w-item{margin-bottom:6px}
.wordhelp .w-item:last-child{margin-bottom:0}

/* 생각해 보기 */
.thinkbox{background:var(--box);border-left:5px solid var(--ink);padding:16px 20px;margin:18px 0 0}
.thinkbox p{font-size:.95rem;word-break:keep-all}

/* 성취기준 태그 + 해시태그 */
.std-tags{display:flex;flex-wrap:wrap;gap:8px;margin:22px 0 0}
.std-tag{border:1px solid var(--red);font-size:.8rem;padding:4px 10px;display:inline-flex;gap:7px;align-items:baseline}
.std-tag b{color:var(--red);font-weight:700}
.hash-row{margin-top:14px;font-size:.82rem;color:var(--ink-soft);display:flex;flex-wrap:wrap;gap:4px 14px}
.piece-end{border:0;border-top:3px solid var(--line);margin:36px 0 0}

/* ── 전체 보기 모드 ── */
.view-toggle{display:flex;justify-content:center;margin-top:16px}
.view-toggle button{font-family:var(--sans);font-size:.82rem;border:1px solid var(--line-soft);
  background:transparent;padding:8px 16px;cursor:pointer;color:var(--ink)}
.view-toggle button:hover{border-color:var(--ink)}
.all-divider{text-align:center;font-family:var(--serif);font-weight:700;letter-spacing:.3em;
  font-size:.85rem;color:var(--ink-soft);padding:10px 0 0}

/* ── 푸터 ── */
footer.pub{border-top:3px solid var(--line);margin-top:44px;padding-top:6px}
footer.pub .inner{border-top:1px solid var(--line);padding:18px 0;font-size:.82rem;color:var(--ink-soft);
  word-break:keep-all}
footer.pub b{color:var(--ink)}

@media (max-width:560px){
  html{font-size:16px}
  .mast-side{display:none}
  .day-tab .d-topic{display:none}
  .day-tab{padding:10px 2px}
}
@media (prefers-reduced-motion:no-preference){
  article.piece{animation:rise .35s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
}
</style>
</head>
<body>
<div class="wrap">

<header class="masthead">
  <div class="mast-row">
    <div class="mast-side" id="mastLeft"></div>
    <h1 class="brand"><a href="#" onclick="return goHome()">어린이 사회 뉴스 브리핑</a></h1>
    <div class="mast-side right" id="mastRight"></div>
  </div>
  <p class="slogan">2022 개정 교육과정 성취기준으로 읽는 이번 주 뉴스 — 생각을 여는 기사만 싣습니다</p>
  <hr class="mast-rule"><hr class="mast-rule thin">
</header>

<nav class="issue-nav" aria-label="호 이동">
  <button class="nav-btn" id="prevBtn">◀ 지난 호</button>
  <span class="issue-now" id="issueNow"></span>
  <button class="nav-btn" id="nextBtn">다음 호 ▶</button>
</nav>

<div class="std-strip" id="stdStrip"></div>

<div class="day-tabs" role="tablist" aria-label="요일별 기사" id="dayTabs"></div>
<p class="today-note" id="todayNote"></p>

<main id="main"></main>

<footer class="pub">
  <div class="inner">
    <b>발행 정보</b> — 매주 금요일 발행. 월~금 아침활동에서 하루 한 건씩 읽습니다. 좋은 기사가 없는 주는 쉬어 갑니다.
    본문은 어린이 눈높이로 다시 쓴 글이며, 정확한 내용은 원문 링크에서 확인할 수 있습니다.
  </div>
</footer>

</div>

<script>
let ISSUES = [];

async function boot(){
  try{
    const r = await fetch('data/issues.json', {cache:'no-store'});
    ISSUES = await r.json();
  }catch(e){
    document.getElementById('main').innerHTML =
      '<p style="padding:40px 0;color:#5C5850">데이터를 불러오지 못했습니다. 잠시 후 새로고침해 주세요.</p>';
    return;
  }
  issueIdx = ISSUES.length - 1;
  initView();
  render();
}

/* ═══════ 상태 ═══════ */
const DAYS = ["월","화","수","목","금"];
let issueIdx = 0;
let view = { mode: "day", dayIdx: 0 };     // mode: "day" | "all"

/* 오늘 요일 → 기사 인덱스 (월0~금4, 주말이면 전체 보기) */
function todayDayIdx(){
  const d = new Date().getDay();           // 일0 월1 … 토6
  return (d >= 1 && d <= 5) ? d - 1 : null;
}

/* ═══════ 렌더 ═══════ */
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

function articleHTML(a, issue){
  return `
  <article class="piece">
    <div class="piece-head">
      <span class="section-box">${a.day}요일&nbsp;</span>
      <span class="section-sub">${esc(a.topic)}</span>
    </div>
    <div class="meta-row">
      <span class="scope ${a.scope==="국내"?"dom":"intl"}">${a.scope}</span>
      <span class="report-date">${esc(a.reportDate)}</span>
    </div>
    <h2 class="headline">${esc(a.title)}</h2>
    <p class="deck">${esc(a.deck)}</p>
    <hr class="body-rule">
    ${a.paras.map(p=>`<p class="para">${esc(p)}</p>`).join("")}
    <div class="src-links">
      ${a.sources.map(([n,u])=>`<a href="${u}" target="_blank" rel="noopener">${esc(n)}에서 기사 본문을 확인할 수 있습니다 →</a>`).join("")}
    </div>
    <section class="wordhelp">
      <h3>낱말 도움</h3>
      ${a.words.map(([w,d])=>`<div class="w-item"><dt>${esc(w)}</dt><dd> — ${esc(d)}</dd></div>`).join("")}
    </section>
    <section class="thinkbox">
      <h3>생각해 보기</h3>
      <p>${esc(a.think)}</p>
    </section>
    <div class="std-tags">
      ${a.standards.map(([c,l])=>`<span class="std-tag"><b>[${c}]</b>${esc(l)}</span>`).join("")}
    </div>
    <div class="hash-row">${a.tags.map(t=>`<span>#${esc(t)}</span>`).join("")}</div>
  </article>`;
}

function render(){
  const issue = ISSUES[issueIdx];
  const tIdx = todayDayIdx();

  /* 제호 양옆 */
  document.getElementById("mastLeft").innerHTML =
    `제${issue.no}호<br>매주 금요일 발행 · 주간`;
  document.getElementById("mastRight").innerHTML =
    `${issue.dateLabel}<br>5~6학년군 · 사회 중심`;

  /* 호 내비 */
  document.getElementById("issueNow").textContent =
    `${issue.dateLabel} — 5건 (제${issue.no}호)`;
  const prev = document.getElementById("prevBtn"), next = document.getElementById("nextBtn");
  prev.disabled = issueIdx === 0;
  next.disabled = issueIdx === ISSUES.length - 1;
  prev.textContent = issueIdx > 0 ? `◀ 지난 호 (${ISSUES[issueIdx-1].dateLabel})` : "◀ 지난 호";
  next.textContent = issueIdx < ISSUES.length-1 ? `다음 호 (${ISSUES[issueIdx+1].dateLabel}) ▶` : "다음 호 예정 · 매주 금요일";

  /* 성취기준 스트립 */
  const codes = [...new Set(issue.articles.flatMap(a=>a.standards.map(s=>s[0])))];
  document.getElementById("stdStrip").innerHTML =
    `이번 호 성취기준 — ` + codes.map(c=>`<b>[${c}]</b>`).join(" · ");

  /* 요일 탭 */
  const tabs = document.getElementById("dayTabs");
  tabs.innerHTML = issue.articles.map((a,i)=>`
    <button class="day-tab" role="tab" aria-selected="${view.mode==="day"&&view.dayIdx===i}"
      onclick="selectDay(${i})">
      ${tIdx===i && issueIdx===ISSUES.length-1 ? '<span class="today-dot" title="오늘"></span>':''}
      <span class="d-name">${a.day}</span>
      <span class="d-topic">${esc(a.topic)}</span>
    </button>`).join("") +
    `<button class="day-tab" role="tab" aria-selected="${view.mode==="all"}" onclick="selectAll()">
      <span class="d-name">전체</span><span class="d-topic">이번 호 5건</span>
    </button>`;

  /* 오늘 안내 */
  const note = document.getElementById("todayNote");
  if (view.mode==="day" && tIdx!==null && issueIdx===ISSUES.length-1){
    note.innerHTML = tIdx===view.dayIdx
      ? `<b>●</b> 오늘은 ${DAYS[tIdx]}요일 — 오늘의 기사를 보고 있어요`
      : `<b>●</b> 오늘의 기사는 ${DAYS[tIdx]}요일 기사예요`;
  } else if (tIdx===null && issueIdx===ISSUES.length-1){
    note.textContent = "주말에는 이번 호 전체를 자유롭게 읽어 보세요";
  } else { note.textContent = ""; }

  /* 본문 */
  const main = document.getElementById("main");
  if (view.mode==="day"){
    main.innerHTML = articleHTML(issue.articles[view.dayIdx], issue);
  } else {
    main.innerHTML = issue.articles.map((a,i)=>
      (i>0?`<hr class="piece-end"><p class="all-divider">◆</p>`:"") + articleHTML(a,issue)
    ).join("");
  }
  window.scrollTo({top:0});
}

/* ═══════ 동작 ═══════ */
function selectDay(i){ view={mode:"day",dayIdx:i}; render(); }
function selectAll(){ view={mode:"all",dayIdx:view.dayIdx}; render(); }
function goHome(){ issueIdx=ISSUES.length-1; initView(); render(); return false; }
document.getElementById("prevBtn").onclick=()=>{ if(issueIdx>0){issueIdx--; view={mode:"all",dayIdx:0}; render();} };
document.getElementById("nextBtn").onclick=()=>{ if(issueIdx<ISSUES.length-1){issueIdx++; initView(); render();} };

/* 초기 뷰: 평일이면 오늘 기사, 주말이면 전체 */
function initView(){
  const t = todayDayIdx();
  view = (t===null) ? {mode:"all",dayIdx:0} : {mode:"day",dayIdx:t};
}
boot();
</script>
</body>
</html>
